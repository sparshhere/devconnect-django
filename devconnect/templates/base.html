<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DevConnect</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="{% url 'post_list' %}">

            DevConnect

        </a>

        <div>

            <a class="btn btn-outline-light me-2"
               href="{% url 'post_search' %}">

                Search

            </a>

            {% if request.user.is_authenticated %}

                <a class="btn btn-outline-info me-2"
                   href="{% url 'dashboard' %}">

                    Dashboard

                </a>

                <a class="btn btn-outline-warning me-2"
                   href="{% url 'edit' %}">

                    Profile

                </a>

                <a class="btn btn-outline-secondary me-2"
   href="{% url 'password_change' %}">
    Change Password
</a>

                <form action="{% url 'logout' %}"
                      method="post"
                      class="d-inline">

                    {% csrf_token %}

                    <button class="btn btn-danger"
                            type="submit">

                        Logout

                    </button>

                </form>

            {% else %}

                <a class="btn btn-success me-2"
                   href="{% url 'login' %}">

                    Login

                </a>

                <a class="btn btn-primary"
                   href="{% url 'register' %}">

                    Register

                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
