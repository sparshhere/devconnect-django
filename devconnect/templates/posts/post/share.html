{% extends "base.html" %}

{% block content %}

<h2>Share Post</h2>

{% if sent %}

    <p>
        Email sent successfully.
    </p>

{% else %}

<form method="post">

    {{ form.as_p }}

    {% csrf_token %}

    <button type="submit">
        Send Email
    </button>

</form>

{% endif %}

{% endblock %}
