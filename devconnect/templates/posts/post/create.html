{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-body">

        <h2>Create / Edit Post</h2>

        <form method="post">

            {{ form.as_p }}

            {% csrf_token %}

            <button class="btn btn-success"
                    type="submit">

                Save Post

            </button>

        </form>

    </div>

</div>

{% endblock %}
