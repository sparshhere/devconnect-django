{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Create Account
                </h2>

                <form method="post">

                    {{ user_form.as_p }}

                    {% csrf_token %}

                    <button class="btn btn-success"
                            type="submit">

                        Register

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
