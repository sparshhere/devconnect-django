{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Login
                </h2>

                <form method="post">

                    {{ form.as_p }}

                    {% csrf_token %}

                    <button class="btn btn-primary"
                            type="submit">

                        Login

                    </button>

                </form>
                <hr>

                <a href="{% url 'password_reset' %}">
                    Forgot Password?
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
