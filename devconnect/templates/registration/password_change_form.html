{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h2>Change Password</h2>

        <form method="post">

            {{ form.as_p }}

            {% csrf_token %}

            <button type="submit"
                    class="btn btn-primary">

                Change Password

            </button>

        </form>

    </div>
</div>

{% endblock %}
